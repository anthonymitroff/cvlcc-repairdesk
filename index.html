async function sb(path, opts = {}) {
  const session = JSON.parse(localStorage.getItem("cvlcc_session") || "null");
  const headers = {
    "Content-Type": "application/json",
    "apikey": SUPABASE_KEY,
    "Authorization": `Bearer ${session?.access_token || SUPABASE_KEY}`,
    ...opts.headers,
  };
  const res = await fetch(`${SUPABASE_URL}${path}`, { ...opts, headers });
  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    throw new Error(err.message || err.error_description || res.statusText);
  }
  const text = await res.text();
  return text ? JSON.parse(text) : null;
}

// Auth helpers
async function signIn(email, password) {
  const res = await fetch(`${SUPABASE_URL}/auth/v1/token?grant_type=password`, {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "apikey": SUPABASE_KEY,
      "X-Client-Info": "cvlcc-repairdesk/1.0",
    },
    body: JSON.stringify({ email, password, gotrue_meta_security: {} }),
  });
  const data = await res.json();
  if (!res.ok) {
    const msg = data.error_description || data.msg || data.message || JSON.stringify(data);
    throw new Error(msg);
  }
  localStorage.setItem("cvlcc_session", JSON.stringify(data));
  return data;
}

async function signOut() {
  const session = JSON.parse(localStorage.getItem("cvlcc_session") || "null");
  if (session?.access_token) {
    await fetch(`${SUPABASE_URL}/auth/v1/logout`, {
      method: "POST",
      headers: { "apikey": SUPABASE_KEY, "Authorization": `Bearer ${session.access_token}` },
    }).catch(() => {});
  }
  localStorage.removeItem("cvlcc_session");
}

async function createUser(email, password, fullName, role) {
  // Use service-level admin endpoint via our own sb() helper with service key isn't available
  // Instead use signUp which auto-creates profile via trigger
  const res = await fetch(`${SUPABASE_URL}/auth/v1/admin/users`, {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "apikey": SUPABASE_KEY,
      "Authorization": `Bearer ${SUPABASE_KEY}`,
    },
    body: JSON.stringify({
      email, password,
      email_confirm: true,
      user_metadata: { full_name: fullName, role },
    }),
  });
  const data = await res.json();
  if (!res.ok) throw new Error(data.message || "Failed to create user");
  return data;
}

// ─── Helpers ──────────────────────────────────────────────────────────────────
function uid()      { return Math.random().toString(36).slice(2,9).toUpperCase(); }
function ticketId() { return `RPR-${uid()}`; }
function deviceId() { return `DEV-${uid()}`; }
function fmtDate(iso) {
  if (!iso) return "—";
  return new Date(iso).toLocaleString("en-US",{month:"short",day:"numeric",year:"numeric",hour:"numeric",minute:"2-digit"});
}
function fmtShort(iso) {
  if (!iso) return "—";
  return new Date(iso).toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"});
}

function parseCSV(text) {
  const lines = text.trim().split(/\r?\n/);
  if (lines.length < 2) return { headers:[], rows:[] };
  const headers = lines[0].split(",").map(h=>h.trim().replace(/^"|"$/g,"").toLowerCase());
  const rows = lines.slice(1).map(line => {
    const vals=[]; let cur=""; let inQ=false;
    for (let i=0;i<line.length;i++) {
      const ch=line[i];
      if(ch==='"') { inQ=!inQ; }
      else if(ch===","&&!inQ) { vals.push(cur.trim()); cur=""; }
      else cur+=ch;
    }
    vals.push(cur.trim());
    const obj={};
    headers.forEach((h,i)=>{ obj[h]=(vals[i]||"").replace(/^"|"$/g,"").trim(); });
    return obj;
  }).filter(r=>Object.values(r).some(v=>v));
  return { headers, rows };
}

function csvRowToDevice(row) {
  const get=(...keys)=>{ for(const k of keys){ if(row[k]) return row[k]; } return ""; };
  return {
    id: deviceId(),
    serial_number: get("serial","serial number","serialnumber","sn","serial_number").toUpperCase(),
    device_type:   get("model","device type","devicetype","type","device_type","device")||"MacBook Air",
    asset_tag:     get("asset tag","assettag","asset_tag","asset","tag"),
    assignee_name: get("assignee","assigned to","name","user","assignee name"),
    assignee_id:   get("id","student id","staff id","assignee id","employee id","badge"),
    assignee_type: get("type","assignee type","role","user type")||"Student",
    department:    get("department","dept","grade","class","division"),
    condition:     get("condition","status")||"Good",
    purchase_date: get("purchase date","purchasedate","purchased","buy date","date purchased"),
    warranty_exp:  get("warranty","warranty exp","warranty expiry","warranty date","expiry","expires"),
    notes:         get("notes","note","comments","comment","memo"),
    added_at:      new Date().toISOString(),
    updated_at:    new Date().toISOString(),
  };
}

    setLoading(true);
    try { const data=await sb("/rest/v1/profiles?select=*&order=created_at.desc"); setUsers(data||[]); } catch(e){setErr(e.message);}
    setLoading(false);
  };
  useEffect(()=>{load();},[]);

  const handleCreate=async()=>{
    if(!form.email||!form.password||!form.full_name){setErr("All fields required.");return;}
    setSaving(true);setErr("");

      await createUser(form.email,form.password,form.full_name,form.role);

// ─── Ticket Form ──────────────────────────────────────────────────────────────
function TicketForm({initial,onSave,onClose,currentUser}) {
  const [f,setF]=useState(initial||blankTicket());
  const [partIn,setPartIn]=useState("");
  const set=(k,v)=>setF(p=>({...p,[k]:v}));
  const addPart=p=>{if(!p.trim()||f.parts.includes(p))return;set("parts",[...f.parts,p]);setPartIn("");};
  const delPart=p=>set("parts",f.parts.filter(x=>x!==p));
  const handleSave=async()=>{
    if(!f.serial_number.trim()){alert("Serial number required.");return;}
    if(!f.assignee_name.trim()){alert("Assignee name required.");return;}
    if(!f.tech_name.trim()){alert("Technician name required.");return;}
    const now=new Date().toISOString();
    const auditEntry=initial
      ?{id:uid(),timestamp:now,tech:f.tech_name,user_email:currentUser?.email,action:"Edited",changes:diffTickets(initial,f)}
      :{id:uid(),timestamp:now,tech:f.tech_name,user_email:currentUser?.email,action:"Created",changes:[]};
    const updated={...f,updated_at:now,audit_log:[...(f.audit_log||[]),auditEntry]};
    try {
      if(initial){
        await sb(`/rest/v1/tickets?id=eq.${updated.id}`,{method:"PATCH",body:JSON.stringify(updated)});
      } else {
        await sb("/rest/v1/tickets",{method:"POST",headers:{"Prefer":"return=minimal"},body:JSON.stringify(updated)});
      }
      onSave(updated);
    } catch(e){alert("Error saving ticket: "+e.message);}

    <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:22}}>

          <FSelect label="Device Type" value={f.device_type} onChange={e=>set("device_type",e.target.value)}>{DEVICE_TYPES.map(d=><option key={d}>{d}</option>)}</FSelect>

        <SHead>Assignee</SHead>

          <FInput label="Name *" value={f.assignee_name} onChange={e=>set("assignee_name",e.target.value)}/>
          <FInput label="Student / Staff ID" value={f.assignee_id} onChange={e=>set("assignee_id",e.target.value)}/>
          <FSelect label="Type" value={f.assignee_type} onChange={e=>set("assignee_type",e.target.value)}><option>Student</option><option>Staff</option><option>Faculty</option></FSelect>

// ─── CSV Import ───────────────────────────────────────────────────────────────
function CSVImport({onImport,onClose,existingSerials}) {
  const [step,setStep]=useState("upload");
  const [preview,setPreview]=useState([]);
  const [skipped,setSkipped]=useState([]);
  const [error,setError]=useState("");
  const [importing,setImporting]=useState(false);
  const fileRef=useRef();

  const handleFile=e=>{
    const file=e.target.files[0]; if(!file)return;
    const reader=new FileReader();
    reader.onload=ev=>{
      try {
        const {rows}=parseCSV(ev.target.result);
        if(!rows.length){setError("No data rows found.");return;}
        const mapped=rows.map(csvRowToDevice).filter(d=>d.serial_number);
        const toImport=[],toSkip=[];
        mapped.forEach(d=>existingSerials.has(d.serial_number)?toSkip.push(d):toImport.push(d));
        setPreview(toImport);setSkipped(toSkip);setError("");setStep("preview");
      } catch(err){setError("Could not parse CSV: "+err.message);}
    };
    reader.readAsText(file);
  };

  const handleImport=async()=>{
    setImporting(true);
    try {
      await sb("/rest/v1/devices",{method:"POST",headers:{"Prefer":"return=minimal"},body:JSON.stringify(preview)});
      onImport(preview);setStep("done");
    } catch(e){setError("Import failed: "+e.message);}
    setImporting(false);
  };

  return (
    <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
        <div><div style={{fontSize:10,color:CVLCC_GOLD,fontWeight:700,letterSpacing:"0.1em",textTransform:"uppercase"}}>CSV Import</div><div style={{fontSize:17,fontWeight:800,color:"#FFE8E8",fontFamily:"'Sora',sans-serif"}}>Import Devices</div></div>
        <button onClick={onClose} style={{background:"none",border:"none",color:"#7A4A4A",cursor:"pointer",fontSize:22}}>✕</button>
      </div>
      {step==="upload"&&(
        <>
          <div style={{background:"#0A0000",borderRadius:12,padding:"16px 18px",marginBottom:16}}>
            <SHead>Accepted Column Names</SHead>
            <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
              {["serial","model","asset tag","assignee","id","type","department","condition","purchase date","warranty exp","notes"].map(c=>(
                <span key={c} style={{background:CVLCC_CARD,color:"#FCA5A5",border:`1px solid ${CVLCC_BORDER}`,borderRadius:6,padding:"4px 10px",fontSize:11,fontFamily:"monospace"}}>{c}</span>
              ))}
            </div>
            <div style={{fontSize:12,color:"#7A4A4A",marginTop:10}}>Only <b style={{color:"#DBA0A0"}}>serial</b> is required. Column names are flexible.</div>
          </div>
          {error&&<div style={{background:"#2D0000",border:"1px solid #7F1D1D",borderRadius:10,padding:"10px 14px",color:"#F87171",fontSize:13,marginBottom:14}}>{error}</div>}
          <div onClick={()=>fileRef.current.click()} style={{background:"#0A0000",border:`2px dashed ${CVLCC_RED}`,borderRadius:14,padding:"36px 24px",textAlign:"center",cursor:"pointer",marginBottom:16}}
            onMouseEnter={e=>e.currentTarget.style.background="#150000"}
            onMouseLeave={e=>e.currentTarget.style.background="#0A0000"}>
            <div style={{fontSize:36,marginBottom:10}}>📂</div>
            <div style={{fontSize:15,fontWeight:700,color:CVLCC_GOLD}}>Click to select CSV file</div>
            <div style={{fontSize:12,color:"#7A4A4A",marginTop:6}}>.csv files only</div>
            <input ref={fileRef} type="file" accept=".csv,text/csv" onChange={handleFile} style={{display:"none"}}/>
          </div>
          <Btn variant="secondary" onClick={onClose} style={{width:"100%"}}>Cancel</Btn>
        </>
      )}
      {step==="preview"&&(
        <>
          <div style={{display:"flex",gap:12,marginBottom:16,flexWrap:"wrap"}}>
            <StatCard label="To Import" value={preview.length} accent={CVLCC_GOLD}/>
            <StatCard label="Skipped (exist)" value={skipped.length} accent="#F87171"/>
          </div>
          {error&&<div style={{background:"#2D0000",border:"1px solid #7F1D1D",borderRadius:10,padding:"10px 14px",color:"#F87171",fontSize:13,marginBottom:14}}>{error}</div>}
          {skipped.length>0&&<div style={{background:"#2D1000",border:"1px solid #78350F",borderRadius:10,padding:"10px 14px",marginBottom:14,fontSize:12,color:"#FCD34D"}}>Skipped: {skipped.map(d=>d.serial_number).join(", ")}</div>}
          <div style={{maxHeight:300,overflowY:"auto",marginBottom:16}}>
            <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
              <thead><tr style={{borderBottom:`1px solid ${CVLCC_BORDER}`}}>{["Serial","Model","Asset Tag","Assignee","Condition"].map(h=><th key={h} style={{padding:"8px 10px",textAlign:"left",color:"#7A4A4A",fontWeight:700,fontSize:10,textTransform:"uppercase",letterSpacing:"0.07em"}}>{h}</th>)}</tr></thead>
              <tbody>{preview.map((d,i)=><tr key={i} style={{borderBottom:`1px solid #0A0000`}}><td style={{padding:"8px 10px",color:"#FCA5A5",fontFamily:"monospace",fontSize:11}}>{d.serial_number}</td><td style={{padding:"8px 10px",color:"#FFE8E8"}}>{d.device_type}</td><td style={{padding:"8px 10px",color:"#DBA0A0"}}>{d.asset_tag||"—"}</td><td style={{padding:"8px 10px",color:"#DBA0A0"}}>{d.assignee_name||"—"}</td><td style={{padding:"8px 10px",color:CONDITION_META[d.condition]?.color||"#DBA0A0"}}>{d.condition}</td></tr>)}</tbody>
            </table>
          </div>
          <div style={{display:"flex",gap:10}}>
            <Btn variant="secondary" onClick={()=>setStep("upload")} style={{flex:1}}>Back</Btn>
            <Btn variant="gold" onClick={handleImport} disabled={!preview.length||importing} style={{flex:2}}>{importing?"Importing…":`Import ${preview.length} Device${preview.length!==1?"s":""}`}</Btn>
          </div>
        </>
      )}
      {step==="done"&&<div style={{textAlign:"center",padding:"32px 0"}}><div style={{fontSize:48,marginBottom:16}}>✅</div><div style={{fontSize:18,fontWeight:800,color:"#FFE8E8",fontFamily:"'Sora',sans-serif",marginBottom:8}}>Import Complete</div><div style={{fontSize:14,color:"#7A4A4A",marginBottom:24}}>{preview.length} device{preview.length!==1?"s":""} added.</div><Btn variant="primary" onClick={onClose}>Done</Btn></div>}
    </div>
  );
}

// ─── Dashboard ────────────────────────────────────────────────────────────────
function Dashboard({devices,tickets,onViewDevice,onViewTicket}) {
  const open=tickets.filter(t=>t.status!=="Closed");
  const totalOwed=tickets.filter(t=>["Pending","Overdue"].includes(t.payment_status)).reduce((a,t)=>a+(parseFloat(t.charge_amount)||0),0);
  const totalPaid=tickets.filter(t=>t.payment_status==="Paid").reduce((a,t)=>a+(parseFloat(t.charge_amount)||0),0);
  const overdue=tickets.filter(t=>t.payment_status==="Overdue");
  const warrantyExpiring=devices.filter(d=>d.warranty_exp&&new Date(d.warranty_exp)>new Date()&&(new Date(d.warranty_exp)-new Date())<1000*60*60*24*90);
  const recent=[...tickets].sort((a,b)=>new Date(b.updated_at)-new Date(a.updated_at)).slice(0,5);
  return (
    <div>
      <div style={{display:"flex",gap:12,flexWrap:"wrap",marginBottom:24}}>
        <StatCard label="Devices" value={devices.length} sub={`${devices.filter(d=>d.device_type?.includes("MacBook")).length} MacBooks · ${devices.filter(d=>d.device_type?.includes("iPad")).length} iPads`} accent={CVLCC_GOLD}/>
        <StatCard label="Open Repairs" value={open.length} sub={`${tickets.length} total`} accent={CVLCC_RED}/>
        <StatCard label="Outstanding" value={`$${totalOwed.toFixed(2)}`} sub="Pending/overdue" accent="#F87171"/>
        <StatCard label="Collected" value={`$${totalPaid.toFixed(2)}`} accent="#34D399"/>
      </div>
      {warrantyExpiring.length>0&&<div style={{background:"#1A0800",border:"1px solid #78350F",borderRadius:14,padding:"16px 20px",marginBottom:20}}><div style={{fontSize:11,color:"#F97316",fontWeight:700,letterSpacing:"0.09em",textTransform:"uppercase",marginBottom:10}}>⚠ Warranty Expiring Soon ({warrantyExpiring.length})</div>{warrantyExpiring.map(d=><div key={d.id} onClick={()=>onViewDevice(d)} style={{display:"flex",alignItems:"center",gap:12,padding:"7px 0",borderBottom:"1px solid #2D1500",cursor:"pointer"}}><div style={{flex:1}}><div style={{fontSize:13,fontWeight:700,color:"#FED7AA"}}>{d.device_type} · {d.serial_number}</div><div style={{fontSize:11,color:"#92400E"}}>{d.assignee_name||"Unassigned"}</div></div><div style={{fontSize:11,color:"#F97316",fontWeight:700}}>Exp: {fmtShort(d.warranty_exp)}</div></div>)}</div>}
      <div style={{background:CVLCC_CARD,borderRadius:14,padding:"18px 20px",marginBottom:20}}>
        <div style={{fontSize:11,color:CVLCC_GOLD,fontWeight:700,letterSpacing:"0.09em",textTransform:"uppercase",marginBottom:14}}>Repairs by Status</div>
        <div style={{display:"flex",gap:10,flexWrap:"wrap"}}>{STATUSES.map(s=>{const count=tickets.filter(t=>t.status===s).length;const m=STATUS_META[s];return <div key={s} style={{background:m.bg,border:`1px solid ${m.dot}44`,borderRadius:10,padding:"10px 16px",minWidth:90}}><div style={{fontSize:22,fontWeight:800,color:m.text,fontFamily:"'Sora',sans-serif"}}>{count}</div><div style={{fontSize:11,color:m.text,fontWeight:600,marginTop:2}}>{s}</div></div>;})}</div>
      </div>
      <div style={{background:CVLCC_CARD,borderRadius:14,padding:"18px 20px",marginBottom:20}}>
        <div style={{fontSize:11,color:CVLCC_GOLD,fontWeight:700,letterSpacing:"0.09em",textTransform:"uppercase",marginBottom:14}}>Recent Activity</div>
        {recent.length===0?<div style={{color:"#7A4A4A",fontSize:13,textAlign:"center",padding:"20px 0"}}>No tickets yet.</div>:recent.map(t=>(
          <div key={t.id} onClick={()=>onViewTicket(t)} style={{display:"flex",alignItems:"center",gap:14,padding:"10px 0",borderBottom:`1px solid ${CVLCC_BORDER}`,cursor:"pointer"}}
            onMouseEnter={e=>e.currentTarget.style.opacity="0.75"} onMouseLeave={e=>e.currentTarget.style.opacity="1"}>
            <div style={{fontSize:20}}>{t.device_type?.includes("MacBook")?"💻":"📱"}</div>
            <div style={{flex:1,minWidth:0}}><div style={{fontSize:13,fontWeight:700,color:"#FFE8E8"}}>{t.assignee_name} <span style={{color:"#7A4A4A",fontWeight:400}}>· {t.device_type}</span></div><div style={{fontSize:11,color:"#7A4A4A",fontFamily:"monospace"}}>{t.id} · {t.serial_number}</div></div>
            <div style={{textAlign:"right",flexShrink:0}}><Badge label={t.status} meta={STATUS_META[t.status]}/><div style={{fontSize:10,color:"#7A4A4A",marginTop:4}}>{fmtShort(t.updated_at)}</div></div>
          </div>
        ))}
      </div>
      {overdue.length>0&&<div style={{background:"#1A0A00",border:"1px solid #7C2D12",borderRadius:14,padding:"18px 20px"}}><div style={{fontSize:11,color:"#F97316",fontWeight:700,letterSpacing:"0.09em",textTransform:"uppercase",marginBottom:14}}>⚠ Overdue Payments</div>{overdue.map(t=><div key={t.id} onClick={()=>onViewTicket(t)} style={{display:"flex",alignItems:"center",gap:14,padding:"9px 0",borderBottom:"1px solid #2D1100",cursor:"pointer"}}><div style={{flex:1}}><div style={{fontSize:13,fontWeight:700,color:"#FED7AA"}}>{t.assignee_name}</div><div style={{fontSize:11,color:"#92400E",fontFamily:"monospace"}}>{t.id} · {t.serial_number}</div></div><div style={{fontSize:14,fontWeight:800,color:"#F97316"}}>${parseFloat(t.charge_amount||0).toFixed(2)}</div></div>)}</div>}
    </div>
  );
}

// ─── Inventory View ───────────────────────────────────────────────────────────
function InventoryView({devices,tickets,onView}) {
  const [search,setSearch]=useState("");
  const [fCond,setFCond]=useState("All");
  const [fType,setFType]=useState("All");
  const filtered=devices.filter(d=>{
    const q=search.toLowerCase();
    const ms=!q||[d.serial_number,d.assignee_name,d.asset_tag,d.assignee_id,d.department,d.device_type].some(v=>(v||"").toLowerCase().includes(q));
    return ms&&(fCond==="All"||d.condition===fCond)&&(fType==="All"||d.device_type===fType);
  });
  return (
    <div>
      <div style={{display:"flex",gap:12,flexWrap:"wrap",marginBottom:16}}>
        <StatCard label="Total Devices" value={devices.length} accent={CVLCC_GOLD}/>
        <StatCard label="MacBooks" value={devices.filter(d=>d.device_type?.includes("MacBook")).length} accent={CVLCC_RED}/>
        <StatCard label="iPads" value={devices.filter(d=>d.device_type?.includes("iPad")).length} accent="#A78BFA"/>
      </div>
      <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:14}}>{CONDITIONS.map(c=>{const count=devices.filter(d=>d.condition===c).length;if(!count)return null;const m=CONDITION_META[c];return <div key={c} onClick={()=>setFCond(fCond===c?"All":c)} style={{background:fCond===c?m.bg:CVLCC_CARD,border:`1px solid ${fCond===c?m.color+"66":CVLCC_BORDER}`,borderRadius:10,padding:"8px 14px",cursor:"pointer",flexShrink:0}}><div style={{fontSize:18,fontWeight:800,color:m.color,fontFamily:"'Sora',sans-serif"}}>{count}</div><div style={{fontSize:10,color:m.color,fontWeight:700}}>{c}</div></div>;})}
      </div>
      <div style={{display:"flex",gap:10,marginBottom:14,flexWrap:"wrap"}}>
        <div style={{flex:1,position:"relative",minWidth:200}}>
          <span style={{position:"absolute",left:12,top:"50%",transform:"translateY(-50%)",color:"#7A4A4A"}}>🔍</span>
          <input placeholder="Search serial, name, asset tag..." value={search} onChange={e=>setSearch(e.target.value)} style={{width:"100%",background:CVLCC_CARD,border:`1px solid ${CVLCC_BORDER}`,borderRadius:10,padding:"9px 12px 9px 36px",color:"#FFE8E8",fontSize:14,outline:"none",fontFamily:"inherit",boxSizing:"border-box"}}/>
        </div>
        <select value={fType} onChange={e=>setFType(e.target.value)} style={{background:CVLCC_CARD,border:`1px solid ${CVLCC_BORDER}`,borderRadius:10,padding:"9px 12px",color:"#FFE8E8",fontSize:13,outline:"none",fontFamily:"inherit",cursor:"pointer"}}>
          <option value="All">All Types</option>{DEVICE_TYPES.map(t=><option key={t}>{t}</option>)}
        </select>
      </div>
      <div style={{fontSize:11,color:"#7A4A4A",marginBottom:10}}>{filtered.length} device{filtered.length!==1?"s":""}</div>
      {filtered.length===0?<div style={{textAlign:"center",padding:"60px 0",color:"#3A1A1A"}}><div style={{fontSize:40,marginBottom:10}}>💻</div><div style={{fontSize:15,fontWeight:600,color:"#7A4A4A"}}>{devices.length===0?"No devices yet":"No results"}</div></div>
        :filtered.map(d=>{
        const cm=CONDITION_META[d.condition]||CONDITION_META["Good"];
        const openRepairs=(tickets||[]).filter(t=>t.serial_number===d.serial_number&&t.status!=="Closed").length;
        const warrantyExpired=d.warranty_exp&&new Date(d.warranty_exp)<new Date();
        return <div key={d.id} onClick={()=>onView(d)} style={{background:CVLCC_CARD,border:`1px solid ${CVLCC_BORDER}`,borderRadius:12,padding:"14px 18px",marginBottom:8,cursor:"pointer",display:"flex",alignItems:"center",gap:14}}
          onMouseEnter={e=>e.currentTarget.style.borderColor=CVLCC_RED}
          onMouseLeave={e=>e.currentTarget.style.borderColor=CVLCC_BORDER}>
          <div style={{fontSize:24,flexShrink:0}}>{d.device_type?.includes("MacBook")?"💻":"📱"}</div>
          <div style={{flex:1,minWidth:0}}>
            <div style={{display:"flex",gap:8,alignItems:"center",marginBottom:3,flexWrap:"wrap"}}>
              <span style={{fontSize:12,fontFamily:"monospace",color:"#FCA5A5",fontWeight:700}}>{d.serial_number}</span>
              {d.asset_tag&&<span style={{fontSize:11,color:"#7A4A4A"}}>{d.asset_tag}</span>}
              <Badge label={d.condition} meta={cm}/>
              {openRepairs>0&&<span style={{background:"#2D1A0A",color:"#FB923C",border:"1px solid #F9731633",padding:"2px 8px",borderRadius:99,fontSize:10,fontWeight:700}}>{openRepairs} open</span>}
            </div>
            <div style={{fontSize:14,fontWeight:700,color:"#FFE8E8"}}>{d.device_type}</div>
            <div style={{fontSize:12,color:"#7A4A4A"}}>{d.assignee_name||"Unassigned"}{d.department?` · ${d.department}`:""}</div>
          </div>
          <div style={{textAlign:"right",flexShrink:0}}>
            {d.warranty_exp&&<div style={{fontSize:10,color:warrantyExpired?"#F87171":"#34D399",marginBottom:4,fontWeight:700}}>{warrantyExpired?"Expired":"Warranty OK"}</div>}
            <div style={{fontSize:10,color:"#3A1A1A"}}>{fmtShort(d.added_at)}</div>
          </div>
        </div>;
      })}
    </div>
  );
}

// ─── Payments View ────────────────────────────────────────────────────────────

      </div>
      <div style={{display:"flex",gap:8,marginBottom:18,flexWrap:"wrap"}}>{["All",...Object.keys(PAYMENT_STATUS)].map(s=><button key={s} onClick={()=>setFilter(s)} style={{background:filter===s?CVLCC_RED:CVLCC_CARD,border:`1px solid ${filter===s?CVLCC_RED:CVLCC_BORDER}`,color:filter===s?"#fff":"#7A4A4A",borderRadius:99,padding:"6px 14px",fontSize:12,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>{s}</button>)}</div>

        <div key={t.id} onClick={()=>onView(t)} style={{background:CVLCC_CARD,border:`1px solid ${CVLCC_BORDER}`,borderRadius:12,padding:"14px 18px",cursor:"pointer",display:"flex",alignItems:"center",gap:16,marginBottom:8}}
          onMouseEnter={e=>e.currentTarget.style.borderColor=CVLCC_RED}
          onMouseLeave={e=>e.currentTarget.style.borderColor=CVLCC_BORDER}>
          <div style={{flex:1,minWidth:0}}><div style={{fontSize:13,fontWeight:700,color:"#FFE8E8"}}>{t.assignee_name} <span style={{color:"#7A4A4A"}}>· {t.assignee_type}</span></div><div style={{fontSize:11,color:"#7A4A4A",fontFamily:"monospace",marginTop:2}}>{t.id} · {t.serial_number}</div><div style={{fontSize:11,color:"#7A4A4A",marginTop:2}}>{t.charge_type}</div></div>
          <div style={{textAlign:"right",flexShrink:0}}><div style={{fontSize:16,fontWeight:800,color:t.charge_amount?pm.color:"#7A4A4A"}}>{t.charge_amount?`$${parseFloat(t.charge_amount).toFixed(2)}`:"—"}</div><div style={{marginTop:4}}><span style={{background:pm.bg,color:pm.color,padding:"3px 10px",borderRadius:99,fontSize:11,fontWeight:700}}>{t.payment_status}</span></div></div>
        </div>
      );})}
    </div>
  );
}

// ─── Audit Log ────────────────────────────────────────────────────────────────
function AuditLogView({tickets,onView}) {
  const all=tickets.flatMap(t=>(t.audit_log||[]).map(e=>({...e,ticket:t}))).sort((a,b)=>new Date(b.timestamp)-new Date(a.timestamp));
  return (
    <div>
      <div style={{fontSize:12,color:"#7A4A4A",marginBottom:16}}>{all.length} total entries</div>
      {all.length===0?<div style={{color:"#7A4A4A",textAlign:"center",padding:"40px 0"}}>No audit entries yet.</div>
        :all.map((e,i)=>(
        <div key={i} style={{background:CVLCC_CARD,border:`1px solid ${CVLCC_BORDER}`,borderLeft:`3px solid ${CVLCC_RED}`,borderRadius:12,padding:"14px 16px",marginBottom:10}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:8,flexWrap:"wrap",gap:6}}>
            <div><span style={{fontSize:12,fontWeight:800,color:CVLCC_GOLD}}>{e.action}</span><span style={{fontSize:12,color:"#7A4A4A",marginLeft:8}}>by <b style={{color:"#DBA0A0"}}>{e.tech}</b></span>{e.user_email&&<span style={{fontSize:11,color:"#5A3A3A",marginLeft:6}}>({e.user_email})</span>}<span style={{fontSize:12,color:"#7A4A4A",marginLeft:8}}>on </span><span onClick={()=>onView(e.ticket)} style={{fontSize:12,color:"#FCA5A5",cursor:"pointer",textDecoration:"underline",fontFamily:"monospace"}}>{e.ticket.id}</span></div>
            <div style={{fontSize:11,color:"#7A4A4A",fontFamily:"monospace"}}>{fmtDate(e.timestamp)}</div>
          </div>
          {e.changes?.length>0&&<div style={{display:"flex",flexDirection:"column",gap:5}}>{e.changes.map((c,j)=><div key={j} style={{background:"#050000",borderRadius:8,padding:"7px 10px",fontSize:12}}><span style={{color:"#DBA0A0",fontWeight:700}}>{c.field}: </span>{c.from!==""&&c.from!==undefined&&<><span style={{color:"#F87171",textDecoration:"line-through",marginRight:6}}>{Array.isArray(c.from)?c.from.join(", ")||"(empty)":String(c.from)||"(empty)"}</span><span style={{color:"#5A3A3A",marginRight:6}}>→</span></>}<span style={{color:"#34D399"}}>{Array.isArray(c.to)?c.to.join(", ")||"(empty)":String(c.to)||"(empty)"}</span></div>)}</div>}
        </div>
      ))}
    </div>
  );
}

// ─── Serial Lookup ────────────────────────────────────────────────────────────
function SerialLookup({devices,tickets,onNewTicket,onViewTicket,onViewDevice,isAdmin}) {
  const [serial,setSerial]=useState("");
  const [searched,setSearched]=useState(false);
  const norm=serial.trim().toUpperCase();
  const matchDev=norm.length>=3?devices.filter(d=>(d.serial_number||"").includes(norm)):[];
  const matchTix=norm.length>=3?tickets.filter(t=>(t.serial_number||"").includes(norm)):[];
  const exactDev=devices.find(d=>d.serial_number===norm);
  return (
    <div style={{display:"flex",flexDirection:"column",alignItems:"center",padding:"40px 24px 32px"}}>
      <style>{`@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}`}</style>
      <div style={{animation:"fadeUp 0.4s ease",width:"100%",maxWidth:580}}>
        <div style={{textAlign:"center",marginBottom:32}}>
          <div style={{width:80,height:80,borderRadius:"50%",overflow:"hidden",margin:"0 auto 14px",border:`3px solid ${CVLCC_RED}`}}><img src={CVLCC_LOGO} style={{width:80,height:80,objectFit:"cover"}}/></div>
          <div style={{fontSize:11,fontWeight:700,color:CVLCC_RED,letterSpacing:"0.12em",textTransform:"uppercase",marginBottom:8}}>Device Lookup</div>
          <div style={{fontSize:26,fontWeight:800,color:"#FFE8E8",fontFamily:"'Sora',sans-serif",lineHeight:1.2}}>Enter a Serial Number</div>
          <div style={{fontSize:13,color:"#7A4A4A",marginTop:8}}>Pull up inventory record, repair history, or create a new case</div>
        </div>
        <div style={{background:CVLCC_CARD,border:`2px solid ${serial?CVLCC_RED:CVLCC_BORDER}`,borderRadius:16,padding:"6px 6px 6px 18px",display:"flex",alignItems:"center",gap:10,marginBottom:20,transition:"border-color 0.2s"}}>
          <span style={{fontSize:18,flexShrink:0}}>🔍</span>
          <input autoFocus value={serial} onChange={e=>{setSerial(e.target.value.toUpperCase());setSearched(false);}} onKeyDown={e=>e.key==="Enter"&&norm&&setSearched(true)} placeholder="e.g. C02XL4EDJGH5" style={{flex:1,background:"none",border:"none",color:"#FFE8E8",fontSize:18,outline:"none",fontFamily:"'DM Mono',monospace",letterSpacing:"0.08em",padding:"10px 0"}}/>
          {serial&&<button onClick={()=>{setSerial("");setSearched(false);}} style={{background:"none",border:"none",color:"#7A4A4A",cursor:"pointer",fontSize:20,padding:"0 8px",lineHeight:1}}>✕</button>}
          <Btn variant="primary" onClick={()=>norm&&setSearched(true)} style={{flexShrink:0,padding:"12px 20px",fontSize:14}}>Look Up</Btn>
        </div>

        {searched&&norm&&(
          <div style={{animation:"fadeUp 0.3s ease"}}>
            {exactDev?(
              <div onClick={()=>onViewDevice(exactDev)} style={{background:CVLCC_CARD,border:`1px solid ${CVLCC_RED}55`,borderRadius:14,padding:"14px 18px",marginBottom:14,display:"flex",alignItems:"center",gap:14,cursor:"pointer"}}>
                <div style={{fontSize:28}}>{exactDev.device_type?.includes("MacBook")?"💻":"📱"}</div>
                <div style={{flex:1}}>
                  <div style={{fontSize:10,color:CVLCC_RED,fontWeight:700,textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:2}}>Inventory Record Found</div>
                  <div style={{fontSize:14,fontWeight:800,color:CVLCC_GOLD,fontFamily:"'Sora',sans-serif"}}>{exactDev.device_type}</div>
                  <div style={{fontSize:12,color:"#DBA0A0",marginTop:2}}>{exactDev.assignee_name||"Unassigned"}{exactDev.asset_tag?` · ${exactDev.asset_tag}`:""}</div>
                </div>
                <div style={{textAlign:"right"}}><Badge label={exactDev.condition} meta={CONDITION_META[exactDev.condition]||CONDITION_META["Good"]}/><div style={{fontSize:10,color:"#7A4A4A",marginTop:4}}>View →</div></div>
              </div>
            ):(
              <div style={{background:CVLCC_CARD,border:`1px solid ${CVLCC_BORDER}`,borderRadius:12,padding:"12px 16px",marginBottom:14,textAlign:"center",color:"#7A4A4A",fontSize:13}}>
                No inventory record for <span style={{fontFamily:"monospace",color:"#DBA0A0"}}>{norm}</span>
              </div>
            )}
            {isAdmin&&<button onClick={()=>onNewTicket(norm)} style={{width:"100%",background:CVLCC_CARD,border:`2px dashed ${CVLCC_RED}`,color:CVLCC_GOLD,borderRadius:14,padding:"16px",cursor:"pointer",fontWeight:700,fontSize:15,fontFamily:"inherit",marginBottom:16,display:"flex",alignItems:"center",justifyContent:"center",gap:10}}
              onMouseEnter={e=>e.currentTarget.style.background="#150000"}
              onMouseLeave={e=>e.currentTarget.style.background=CVLCC_CARD}>
              <span style={{fontSize:20}}>+</span> Create New Repair Case for {norm}
            </button>}
            {matchTix.length>0?(
              <>
                <div style={{fontSize:11,fontWeight:700,color:"#7A4A4A",letterSpacing:"0.08em",textTransform:"uppercase",marginBottom:10}}>Repair History · {matchTix.length} ticket{matchTix.length!==1?"s":""}</div>
                {[...matchTix].sort((a,b)=>new Date(b.created_at)-new Date(a.created_at)).map(t=>(
                  <div key={t.id} onClick={()=>onViewTicket(t)} style={{background:CVLCC_CARD,border:`1px solid ${CVLCC_BORDER}`,borderRadius:12,padding:"14px 18px",cursor:"pointer",display:"flex",alignItems:"center",gap:14,marginBottom:8}}
                    onMouseEnter={e=>e.currentTarget.style.borderColor=CVLCC_RED}
                    onMouseLeave={e=>e.currentTarget.style.borderColor=CVLCC_BORDER}>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:4,flexWrap:"wrap"}}>
                        <span style={{fontSize:12,fontWeight:700,fontFamily:"monospace",color:"#FCA5A5"}}>{t.id}</span>
                        <Badge label={t.status} meta={STATUS_META[t.status]}/>
                      </div>
                      <div style={{fontSize:14,fontWeight:700,color:"#FFE8E8"}}>{t.assignee_name}</div>
                      {t.issue&&<div style={{fontSize:12,color:"#7A4A4A",marginTop:3,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",maxWidth:340}}>{t.issue}</div>}
                    </div>
                    <div style={{textAlign:"right",flexShrink:0}}><div style={{fontSize:10,color:"#7A4A4A"}}>{fmtShort(t.created_at)}</div></div>
                  </div>
                ))}
              </>
            ):(
              <div style={{textAlign:"center",padding:"24px 0",color:"#7A4A4A"}}><div style={{fontSize:28,marginBottom:8}}>📋</div><div style={{fontSize:13}}>No repair history for this serial number.</div></div>
            )}
          </div>
        )}
        {!searched&&!serial&&<div style={{textAlign:"center",marginTop:28,color:"#3A1A1A"}}><div style={{fontSize:48,marginBottom:12,opacity:0.3}}>💻</div><div style={{fontSize:12}}>Type a serial number above to get started</div></div>}
      </div>
    </div>
  );
}

// ─── Root App ─────────────────────────────────────────────────────────────────
function App() {
  const [session,setSession]=useState(null);
  const [profile,setProfile]=useState(null);
  const [devices,setDevices]=useState([]);
  const [tickets,setTickets]=useState([]);
  const [loaded,setLoaded]=useState(false);
  const [authLoading,setAuthLoading]=useState(true);
  const [screen,setScreen]=useState("lookup");
  const [view,setView]=useState("Dashboard");
  const [modal,setModal]=useState(null);
  const [selDevice,setSelDevice]=useState(null);
  const [selTicket,setSelTicket]=useState(null);
  const [newSerial,setNewSerial]=useState("");
  const [showUsers,setShowUsers]=useState(false);

  const isAdmin=profile?.role==="admin";

  // Check for existing session
  useEffect(()=>{
    const stored=localStorage.getItem("cvlcc_session");
    if(stored){
      const s=JSON.parse(stored);
      setSession(s);
      loadProfile(s.user?.id).then(()=>setAuthLoading(false));
    } else {
      setAuthLoading(false);
    }
  },[]);

  const loadProfile=async(userId)=>{
    try {
      const data=await sb(`/rest/v1/profiles?id=eq.${userId}&select=*`);
      if(data&&data[0]) setProfile(data[0]);
    } catch(e){console.error("Profile load error",e);}
  };

  // Load data from Supabase
  useEffect(()=>{
    if(!session)return;
    (async()=>{
      try {
        const [d,t]=await Promise.all([
          sb("/rest/v1/devices?select=*&order=added_at.desc"),
          sb("/rest/v1/tickets?select=*&order=created_at.desc"),
        ]);
        setDevices(d||[]);
        setTickets(t||[]);
      } catch(e){console.error("Data load error",e);}
      setLoaded(true);
    })();
  },[session]);

  const handleLogin=async(s)=>{
    setSession(s);
    await loadProfile(s.user?.id);
  };

  const handleSignOut=async()=>{
    await signOut();
    setSession(null);setProfile(null);setDevices([]);setTickets([]);setLoaded(false);
  };

  // Device ops
  const addDevice=d=>{setDevices(prev=>[d,...prev]);setModal(null);};
  const updateDevice=d=>{setDevices(prev=>prev.map(x=>x.id===d.id?d:x));setModal(null);setSelDevice(null);};
  const deleteDevice=async(id)=>{
    if(!confirm("Delete this device?"))return;
    try{await sb(`/rest/v1/devices?id=eq.${id}`,{method:"DELETE"});}catch(e){alert(e.message);return;}
    setDevices(prev=>prev.filter(x=>x.id!==id));setModal(null);setSelDevice(null);
  };
  const importDevices=d=>{setDevices(prev=>[...d,...prev]);};

  // Ticket ops
  const createTicket=t=>{setTickets(prev=>[t,...prev]);setModal(null);setNewSerial("");};
  const updateTicket=t=>{setTickets(prev=>prev.map(x=>x.id===t.id?t:x));setModal(null);setSelTicket(null);};
  const deleteTicket=async(id)=>{
    if(!confirm("Delete this ticket?"))return;
    try{await sb(`/rest/v1/tickets?id=eq.${id}`,{method:"DELETE"});}catch(e){alert(e.message);return;}
    setTickets(prev=>prev.filter(x=>x.id!==id));setModal(null);setSelTicket(null);
  };

  const openDevice=d=>{setSelDevice(d);setModal("view-device");};
  const openTicket=t=>{setSelTicket(t);setModal("view-ticket");setScreen("main");};
  const openNewTicket=serial=>{setNewSerial(serial||"");setModal("new-ticket");};

  if(authLoading) return <div style={{background:CVLCC_DARK,minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",color:CVLCC_RED,fontFamily:"monospace",fontSize:14}}>Loading…</div>;
  if(!session) return <LoginScreen onLogin={handleLogin}/>;

  const existingSerials=new Set(devices.map(d=>d.serial_number));

  const sharedModals=(
    <>
      {isAdmin&&modal==="new-device"&&<Modal onClose={()=>setModal(null)}><DeviceForm onSave={addDevice} onClose={()=>setModal(null)}/></Modal>}
      {isAdmin&&modal==="edit-device"&&selDevice&&<Modal onClose={()=>setModal(null)}><DeviceForm initial={selDevice} onSave={updateDevice} onClose={()=>setModal(null)}/></Modal>}
      {modal==="view-device"&&selDevice&&<Modal onClose={()=>{setModal(null);setSelDevice(null);}} wide>
        <DeviceDetail device={selDevice} tickets={tickets} onClose={()=>{setModal(null);setSelDevice(null);}} onEdit={d=>{setSelDevice(d);setModal("edit-device");}} onDelete={deleteDevice} onNewTicket={s=>{setNewSerial(s);setModal("new-ticket");}} onViewTicket={t=>{setSelTicket(t);setModal("view-ticket");}} isAdmin={isAdmin}/>
      </Modal>}
      {isAdmin&&modal==="csv"&&<Modal onClose={()=>setModal(null)} extraWide><CSVImport onImport={importDevices} onClose={()=>setModal(null)} existingSerials={existingSerials}/></Modal>}
      {isAdmin&&modal==="new-ticket"&&<Modal onClose={()=>{setModal(null);setNewSerial("");}}>
        <TicketForm onSave={createTicket} onClose={()=>{setModal(null);setNewSerial("");}} initial={newSerial?{...blankTicket(newSerial)}:undefined} currentUser={session?.user}/>
      </Modal>}
      {modal==="view-ticket"&&selTicket&&<Modal onClose={()=>{setModal(null);setSelTicket(null);}} wide>
        <TicketDetail ticket={selTicket} onClose={()=>{setModal(null);setSelTicket(null);}} onEdit={t=>{setSelTicket(t);setModal("edit-ticket");}} onDelete={deleteTicket} isAdmin={isAdmin}/>
      </Modal>}
      {isAdmin&&modal==="edit-ticket"&&selTicket&&<Modal onClose={()=>{setModal(null);setSelTicket(null);}}>
        <TicketForm initial={selTicket} onSave={updateTicket} onClose={()=>{setModal(null);setSelTicket(null);}} currentUser={session?.user}/>
      </Modal>}
      {isAdmin&&showUsers&&<Modal onClose={()=>setShowUsers(false)} wide><UserManagement onClose={()=>setShowUsers(false)}/></Modal>}
    </>
  );

  return (
    <div style={{background:CVLCC_DARK,minHeight:"100vh",fontFamily:"'DM Sans','Helvetica Neue',sans-serif",color:"#FFE8E8"}}>
      <style>{GS}</style>
      <Header user={session?.user} profile={profile} onSignOut={handleSignOut} view={view} setView={setView} onNewTicket={()=>openNewTicket("")} onNewDevice={()=>setModal("new-device")} onImportCSV={()=>setModal("csv")} screen={screen} setScreen={setScreen}/>
      {isAdmin&&<div style={{background:"#0A0000",borderBottom:`1px solid ${CVLCC_BORDER}`,padding:"6px 20px",display:"flex",gap:12,alignItems:"center"}}>
        <span style={{fontSize:11,color:"#5A3A3A"}}>Admin:</span>
        <button onClick={()=>setShowUsers(true)} style={{background:"none",border:"none",color:CVLCC_GOLD,cursor:"pointer",fontWeight:700,fontSize:11,fontFamily:"inherit",padding:"4px 0",textDecoration:"underline"}}>👥 Manage Users</button>
      </div>}
      <div style={{padding:"24px",maxWidth:960,margin:"0 auto"}}>
        {!loaded&&session?<div style={{textAlign:"center",padding:"60px 0",color:"#7A4A4A"}}>Loading data…</div>:(
          screen==="lookup"?(
            <SerialLookup devices={devices} tickets={tickets} onNewTicket={openNewTicket} onViewTicket={openTicket} onViewDevice={openDevice} isAdmin={isAdmin}/>
          ):(
            <>
              <div style={{marginBottom:20}}>
                <div style={{fontSize:20,fontWeight:800,color:"#FFE8E8",fontFamily:"'Sora',sans-serif"}}>{view}</div>
                <div style={{fontSize:12,color:"#7A4A4A",marginTop:2}}>{view==="Dashboard"&&"Overview of all devices and repair activity"}{view==="Inventory"&&"Full device inventory"}{view==="Repairs"&&"All repair tickets"}{view==="Payments"&&"Repair fees and damage charges"}{view==="Audit Log"&&"Complete change history across all tickets"}</div>
              </div>
              {view==="Dashboard"&&<Dashboard devices={devices} tickets={tickets} onViewDevice={openDevice} onViewTicket={openTicket}/>}
              {view==="Inventory"&&<InventoryView devices={devices} tickets={tickets} onView={openDevice}/>}
              {view==="Repairs"&&<RepairsView tickets={tickets} onView={openTicket}/>}
              {view==="Payments"&&<PaymentsView tickets={tickets} onView={openTicket}/>}
              {view==="Audit Log"&&<AuditLogView tickets={tickets} onView={openTicket}/>}
            </>
          )
        )}
      </div>
      {sharedModals}
    </div>
  );
}

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App/>);
  </script>
</body>
</html>
